services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kadeem
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - kadeem_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kadeem"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kadeem_db:
